<h2 id="5-bi%E1%BB%87n-lu%E1%BA%ADn-lo%E1%BA%A1i-b%E1%BB%8F-c%C3%A1c-%C4%91%E1%BB%81-xu%E1%BA%A5t-kh%C3%A1c-ho%C3%A0ng--huy">5. Biện Luận Loại Bỏ Các Đề Xuất Khác (Hoàng &amp; Huy)</h2>
<ul>
<li data-marpit-fragment="1"><strong>Tại sao loại bỏ bài toán của Vũ Tuấn Hoàng (Học tập &amp; cấu hình Lab)?</strong>
<ul>
<li data-marpit-fragment="2"><em>AI Study:</em> Khó định lượng mức độ &quot;hiểu/nhớ&quot; của SV để đánh giá hiệu quả MVP.</li>
<li data-marpit-fragment="3"><em>Lab Setup:</em> Lỗi môi trường, xung đột thư viện/OS quá dị biệt, không thể thu thập đủ data lỗi để AI bao quát.</li>
</ul>
</li>
<li data-marpit-fragment="4"><strong>Tại sao loại bỏ bài toán của Phạm Quang Huy (Vận hành doanh nghiệp)?</strong>
<ul>
<li data-marpit-fragment="5"><em>CSKH hoàn tiền / Lọc CV ATS / IT Helpdesk:</em> Đều có ROI cao nhưng <strong>không thể tiếp cận dữ liệu thật</strong> (CV ứng viên thật, data giao dịch e-commerce) do bảo mật doanh nghiệp. Khó kiểm chứng thực tế (R/W/A).</li>
</ul>
</li>
<li data-marpit-fragment="6"><strong>Tại sao FaceID điểm danh là tối ưu nhất?</strong>
<ul>
<li data-marpit-fragment="7"><em>Dữ liệu khả thi:</em> Tự thu thập mẫu ảnh SV tại lớp dễ dàng.</li>
<li data-marpit-fragment="8"><em>Validation trực quan:</em> Lắp camera chạy thử nghiệm real-time ngay cửa phòng học.</li>
<li data-marpit-fragment="9"><em>AI là duy nhất:</em> Giải quyết triệt để lỗi thiết bị/wifi và chống gian lận điểm danh hộ 100%.</li>
</ul>
</li>
</ul>

<h3 id="nh%C3%B3m-ti%E1%BA%BFn-h%C3%A0nh-thu-th%E1%BA%ADp-minh-ch%E1%BB%A9ng-v%C3%A0-kh%E1%BA%A3o-s%C3%A1t-nhanh">Nhóm tiến hành thu thập minh chứng và khảo sát nhanh:</h3>

<li data-marpit-fragment="2"><strong>Ghi nhận lớp học thực tế (Tiết 2 ngày 29/05):</strong><br />

11 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> ghi log DB <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> Dashboard realtime.</li>
<li data-marpit-fragment="3"><strong>Bottleneck:</strong> SV đeo khẩu trang/thiếu sáng làm AI không nhận dạng được (tỷ lệ nhỏ, chuyển sang GV check thủ công tại chỗ).</li>
<li data-marpit-fragment="4"><strong>Impact:</strong> Tiết kiệm 8-18 phút lãng phí mỗi buổi học. Loại bỏ 100% tỷ lệ lỗi QR (20-30%) và gian lận điểm danh hộ qua Zalo (10-15%).</li>
<li data-marpit-fragment="5"><strong>Success Metric:</strong> Giảm thời gian điểm danh xuống <strong>&lt;1 phút</strong> (↓95%). Tỷ lệ lỗi quét QR giảm từ 30% xuống <strong>0%</strong>.</li>
<li data-marpit-fragment="6"><strong>AI Boundary:</strong> AI chỉ nhận diện khuôn mặt và lưu log vào DB. Giảng viên giữ quyền tối cao để override/chỉnh sửa kết quả (Human-in-the-loop).</li>
</ul>
</section>

<h2 id="13-l%E1%BB%B1a-ch%E1%BB%8Dn-gi%E1%BA%A3i-ph%C3%A1p-ai-ai-workflow">13. Lựa Chọn Giải Pháp AI: AI Workflow</h2>
<h3 id="so-s%C3%A1nh-m%E1%BB%A9c-%C4%91%E1%BB%99-%E1%BB%A9ng-d%E1%BB%A5ng-c%C3%B4ng-ngh%E1%BB%87">So sánh mức độ ứng dụng công nghệ:</h3>
<ol>
<li><strong>Mức Rule-based (Không dùng AI):</strong> Nâng cấp app QR, bổ sung check GPS/IP/MAC. Rủi ro: Vẫn nghẽn wifi khi 500 SV truy cập cùng lúc và lỗi camera điện thoại.</li>
<li><strong>Mức AI Workflow (LỰA CHỌN CỦA NHÓM):</strong>
<ul>
<li data-marpit-fragment="1"><em>Giải pháp:</em> Camera capture <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> AI trích xuất vector khuôn mặt <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> so khớp vector DB <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> ghi log.</li>
<li data-marpit-fragment="2"><em>Lý do chọn:</em> Điểm danh là quy trình tuyến tính cố định. Chỉ cần AI ở bước nhận diện/matching. Các nghiệp vụ cảnh báo, tính chuyên cần dùng logic lập trình rule-based là đủ ổn định.</li>
</ul>
</li>
<li><strong>Mức AI Agent:</strong> AI tự động quan sát hành vi, tự hỏi đáp khi SV vắng. Rủi ro: Cực kỳ phức tạp, chi phí cao, không cần thiết cho MVP.</li>
</ol>
</section>

<h2 id="14-chi-ti%E1%BA%BFt-ki%E1%BA%BFn-tr%C3%BAc-h%E1%BB%87-th%E1%BB%91ng-faceid--stack-c%C3%B4ng-ngh%E1%BB%87">14. Chi Tiết Kiến Trúc Hệ Thống FaceID &amp; Stack Công Nghệ</h2>
<ul>
<li data-marpit-fragment="1"><strong>Mô tả kỹ thuật từng thành phần:</strong>
<ul>
<li data-marpit-fragment="2"><strong>Camera IP:</strong> Đặt cố định góc cao tại cửa phòng học, kết nối dây LAN (PoE) truyền tín hiệu RTSP stream 1080p @ 30fps về máy chủ.</li>
<li data-marpit-fragment="3"><strong>AI Server (FastAPI / Python):</strong>
<ol>
<li><em>Face Detection (OpenCV / Dlib HOG):</em> Trích xuất frame hình ảnh, phát hiện vị trí các vùng khuôn mặt.</li>
<li><em>Face Encoding (ResNet-29):</em> Chuyển đổi ảnh khuôn mặt thành vector 128 chiều đặc trưng đại diện.</li>
<li><em>Face Matching (Euclidean Distance / Cosine Similarity):</em> So sánh khoảng cách vector với database ảnh sinh viên đã đăng ký trước.</li>
</ol>
</li>
<li data-marpit-fragment="4"><strong>Rule-based Engine:</strong>
<ul>

<h2 id="15-quy%E1%BA%BFt-%C4%91%E1%BB%8Bnh-%C4%91%E1%BA%A7u-t%C6%B0-final-decision">15. Quyết Định Đầu Tư (Final Decision)</h2>
<h3 id="%C4%91%C3%A1nh-gi%C3%A1-c%C3%A1c-ti%C3%AAu-ch%C3%AD-quy%E1%BA%BFt-%C4%91%E1%BB%8Bnh-t%E1%BB%95ng-%C4%91i%E1%BB%83m-87">Đánh giá các tiêu chí quyết định (Tổng điểm: 87%):</h3>
<ul>
<li data-marpit-fragment="1"><em>Problem có thật?</em> <strong>100%</strong> (Hơn 20 SV giơ tay lỗi, log chuyên cần xác thực).</li>
<li data-marpit-fragment="2"><em>AI thực sự cần?</em> <strong>100%</strong> (Chỉ AI mới nhận dạng không cần ĐT &amp; wifi, chống gian lận).</li>
<li data-marpit-fragment="3"><em>Tính khả thi dữ liệu?</em> <strong>80%</strong> (Dễ thu thập bộ ảnh mẫu trực tiếp tại lớp).</li>
<li data-marpit-fragment="4"><em>Năng lực nhóm?</em> <strong>70%</strong> (Sử dụng thư viện Python có sẵn OpenCV/face_recognition).</li>
</ul>
<h3 id="quy%E1%BA%BFt-%C4%91%E1%BB%8Bnh-cu%E1%BB%91i-c%C3%B9ng-%F0%9F%9F%A2-go">QUYẾT ĐỊNH CUỐI CÙNG: <img class="emoji" draggable="false" alt="🟢" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f7e2.svg" data-marp-twemoji=""/> GO</h3>
<ul>
<li data-marpit-fragment="5"><strong>Kế hoạch chạy thử (MVP):</strong> Thử nghiệm tại 1 phòng thực hành (40 SV). Lấy 5 ảnh mẫu của 40 SV để đăng ký. Dùng 1 camera IP LAN kết nối trực tiếp PC giảng viên.</li>
<li data-marpit-fragment="6"><strong>Kế hoạch rút lui (Rollback):</strong> Nếu tỷ lệ nhận diện sai (False Positive) &gt; 5% trong 2 tuần chạy thử, hoặc camera lỗi kết nối phần cứng &gt; 3 lần/tuần <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> rollback về hệ thống quét QR code cũ để tối ưu hóa lại thuật toán AI.</li>
